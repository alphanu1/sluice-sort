name: Sluice CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: sluice-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++ make
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y clang make
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Show toolchain
        run: |
          "$CXX" --version
          make --version

      - name: Build
        run: make clean all TARGET=linux CXX="$CXX"

      - name: Run self-test
        run: make test TARGET=linux CXX="$CXX"

      - name: Strict warning check
        run: make strict TARGET=linux CXX="$CXX"

      - name: Upload Linux artifacts
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: sluice-linux
          path: build/linux/
          if-no-files-found: error

  linux-arm:
    name: Linux arm64 (${{ matrix.compiler }})
    # Native aarch64 GitHub-hosted runner (no emulation). These labels are free
    # for public repositories and also available in private repositories.
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++ make
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y clang make
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Show toolchain
        run: |
          "$CXX" --version
          uname -m
          make --version

      # TARGET stays 'linux': the Makefile's linux target uses the native
      # compiler, which on an arm64 runner produces aarch64 binaries.
      - name: Build
        run: make clean all TARGET=linux CXX="$CXX"

      - name: Run self-test
        run: make test TARGET=linux CXX="$CXX"

      - name: Strict warning check
        run: make strict TARGET=linux CXX="$CXX"

      - name: Upload Linux arm64 artifacts
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: sluice-linux-arm64
          path: build/linux/
          if-no-files-found: error

  sanitizers:
    name: Linux sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Run ASan and UBSan tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: make sanitize TARGET=linux CXX=g++

  macos:
    name: macOS (Apple Clang)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          clang++ --version
          make --version

      - name: Build
        run: make clean all TARGET=macos CXX=clang++

      - name: Run self-test
        run: make test TARGET=macos CXX=clang++

      - name: Strict warning check
        run: make strict TARGET=macos CXX=clang++

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sluice-macos
          path: build/macos/
          if-no-files-found: error

  windows:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MSYS2 and MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Show toolchain
        run: |
          g++ --version
          make --version

      - name: Build
        run: make clean all TARGET=windows CXX=g++

      - name: Run self-test
        run: ./build/windows/sluice.exe --test

      - name: Strict warning check
        run: make strict TARGET=windows CXX=g++

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sluice-windows
          path: build/windows/
          if-no-files-found: error

  release:
    name: Compile & release
    needs: [linux, linux-arm, sanitizers, macos, windows]
    # Only from main (real pushes) or a manual run — never from PRs/forks.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to create the tag + release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make zip

      - name: Compile (native Linux)
        run: make clean all TARGET=linux CXX=g++

      - name: Determine version and whether it is already released
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(./build/linux/sluice --version | sed 's/^sluice //')"
          tag="v$(printf '%s' "$version" | tr ' ' '-')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — version unchanged; nothing to release."
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $version -> will create release $tag."
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download platform build artifacts
        if: steps.ver.outputs.create == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        if: steps.ver.outputs.create == 'true'
        run: |
          set -euo pipefail
          slug="$(printf '%s' '${{ steps.ver.outputs.version }}' | tr ' ' '-')"
          mkdir -p dist
          bundle() {   # <src-dir> <platform-label> <tar|zip>
            src="$1"; plat="$2"; kind="$3"
            [ -d "$src" ] || { echo "skip $plat (no artifact at $src)"; return 0; }
            stage="sluice-${slug}-${plat}"
            rm -rf "$stage"; mkdir -p "$stage"
            cp -r "$src"/. "$stage"/
            cp include/sluice.h include/sluice.hpp README.md "$stage"/
            if [ "$kind" = zip ]; then zip -qr "dist/${stage}.zip" "$stage"
            else tar -czf "dist/${stage}.tar.gz" "$stage"; fi
          }
          bundle build/linux                  linux-x86_64 tar
          bundle artifacts/sluice-linux-arm64 linux-arm64  tar
          bundle artifacts/sluice-macos       macos        tar
          bundle artifacts/sluice-windows     windows      zip
          cp docs/methods.svg "dist/sluice-${slug}-benchmark.svg"
          ls -la dist

      - name: Generate release notes (description + benchmark)
        if: steps.ver.outputs.create == 'true'
        run: |
          {
            # Description: the README intro (everything above the first "## "),
            # dropping the redundant version line.
            awk 'NR>1 && /^## /{exit} NR>1{print}' README.md | grep -v '^\*Version'
            echo
            echo '## Benchmark'
            echo
            echo 'Measured on the GitHub-hosted runner for this release (pool of'
            echo 'distinct arrays per size; shared hardware, so trust the ratios):'
            echo
            echo '```'
            ./build/linux/sluice --bench
            echo '```'
            echo
            echo 'Full methodology, the seven-method chart, and the API reference are in the README.'
          } > notes.md
          echo '----- notes.md -----'; cat notes.md

      - name: Create release
        if: steps.ver.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "sluice ${{ steps.ver.outputs.version }}" \
            --notes-file notes.md \
            dist/*
